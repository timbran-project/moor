# Development and Quick-Start Docker Compose Configuration for mooR
#
# Runs the single-process `moor` backend with the Meadow frontend in nginx.
# Persistent data is kept under RUN_DIR.

networks:
  moor_net:

services:
  moor:
    build:
      context: .
      target: backend
      network: host
      args:
        BUILD_PROFILE: ${BUILD_PROFILE:-release-fast}
    container_name: "moor"
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    working_dir: /db
    environment:
      - RUST_BACKTRACE=1
      - HOME=/db
      - XDG_CONFIG_HOME=/db/${RUN_DIR:-run}/config
      - XDG_DATA_HOME=/db/${RUN_DIR:-run}/local-share
    volumes:
      - ./:/db
    command: >
      /moor/moor
        /db/${RUN_DIR:-run}/moor-data
        --db=development.db
        --config-file=/db/${MOOR_CONFIG_FILE:-moor-dev.yaml}
        --import=${IMPORT_PATH:-/db/cores/cowbell/src}
        --import-format=objdef
        --export=/db/${RUN_DIR:-run}/export
        --generate-keypair
        --public-key=/db/${RUN_DIR:-run}/config/moor.key.pub
        --private-key=/db/${RUN_DIR:-run}/config/moor.key.pem
        --enable-curl-worker
        --web-listen-address=0.0.0.0:8081
    ports:
      - "8888:8888"
      - "8081:8081"
    networks:
      moor_net:
        aliases:
          - moor-web-host

  moor-frontend:
    build:
      context: ${MEADOW_PATH:-./clients/meadow}
      target: frontend
      network: host
    container_name: "moor-frontend"
    depends_on:
      - moor
    ports:
      - "8080:80"
    networks:
      - moor_net
