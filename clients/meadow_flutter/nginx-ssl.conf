events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Preserve X-Real-IP from upstream proxy, or use $remote_addr if not set
    # This allows multi-layer proxy setups (external nginx -> docker nginx -> moor-web-host)
    map $http_x_real_ip $real_ip {
        default $http_x_real_ip;
        "" $remote_addr;
    }

    # Define upstream backend
    upstream moor_api {
        server moor-web-host:8081;
    }

    # Root domain - HTTP redirect to HTTPS
    server {
        listen 80;
        server_name timbran.org;

        # Allow Let's Encrypt ACME challenges
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Root domain - HTTPS static site
    server {
        listen 443 ssl;
        http2 on;
        server_name timbran.org;

        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/timbran.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/timbran.org/privkey.pem;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Serve static site content
        location / {
            root /var/www/static;
            index index.html;
            try_files $uri $uri/ =404;
        }

        # Serve Flutter web client under /meadow/ with SPA fallback.
        location /meadow/ {
            root /var/www/static;
            try_files $uri $uri/ /meadow/index.html;
        }

        # Proxy API endpoints for same-origin Flutter web access.
        location /auth/ {
            proxy_pass http://moor_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /v1/ {
            proxy_pass http://moor_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /webhooks/ {
            proxy_pass http://moor_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/(health|version)$ {
            proxy_pass http://moor_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws/ {
            proxy_pass http://moor_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 60s;
        }
    }

    # timbran.ca consulting site - HTTP (certbot + redirect)
    server {
        listen 80;
        server_name timbran.ca www.timbran.ca;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://timbran.ca$request_uri;
        }
    }

    # timbran.ca consulting site - HTTPS
    server {
        listen 443 ssl;
        http2 on;
        server_name timbran.ca www.timbran.ca;

        ssl_certificate /etc/letsencrypt/live/timbran.ca/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/timbran.ca/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            root /var/www/consulting;
            index index.html;
            try_files $uri $uri/ =404;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root /var/www/consulting;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # MOO subdomain - HTTP redirect to HTTPS
    server {
        listen 80;
        server_name moo.timbran.org;

        # Allow Let's Encrypt ACME challenges
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # MOO subdomain - HTTPS web client
    server {
        listen 443 ssl;
        http2 on;
        server_name moo.timbran.org;

        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/timbran.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/timbran.org/privkey.pem;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Serve MOO web client from the built frontend
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;

            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # Proxy API endpoints to the Rust backend
        location /api/ {
            proxy_pass http://moor_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy auth endpoints
        location /auth/ {
            proxy_pass http://moor_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy flatbuffer API endpoints
        location /fb/ {
            proxy_pass http://moor_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy v1 API endpoints
        location /v1/ {
            proxy_pass http://moor_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy other backend endpoints
        location ~ ^/(welcome|eval|verbs|properties|objects|system_property)($|/) {
            proxy_pass http://moor_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy health and version endpoints
        location ~ ^/(health|version)$ {
            proxy_pass http://moor_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy WebSocket connections
        location /ws/ {
            proxy_pass http://moor_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket timeout configuration
            proxy_read_timeout 3600s;    # 1 hour
            proxy_send_timeout 3600s;    # 1 hour
            proxy_connect_timeout 60s;
        }
    }
}
