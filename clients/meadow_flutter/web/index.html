<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta
    name="description"
    content="The Timbran Flutter client for mooR and Cowbell."
  >

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="The Timbran">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>The Timbran</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Vendored argon2-browser runtime required by lib/moor/event_log_kdf_web.dart. -->
  <script>
    // Emscripten uses `Module.locateFile()` to resolve argon2.wasm.
    self.Module = self.Module || {};
    self.Module.locateFile = (path, prefix) => `vendor/argon2/${path}`;
  </script>
  <script src="vendor/argon2/argon2-bundled.min.js"></script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    {{flutter_js}}
    {{flutter_build_config}}

    _flutter.loader.load({
      config: {
        // Allow skwasm on all browser engines, not just Chromium.
        wasmAllowList: { blink: true, gecko: true, webkit: true, unknown: true },
      },
    });
  </script>
</body>
</html>
