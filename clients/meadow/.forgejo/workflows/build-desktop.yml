name: Build Desktop App

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v3
        with:
          name: meadow-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload .AppImage artifact
        uses: actions/upload-artifact@v3
        with:
          name: meadow-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

  # ---------------------------------------------------------------------------
  # macOS build (requires a self-hosted macOS runner)
  # Uncomment and configure when a macOS runner is available.
  # Tauri cannot cross-compile — each platform needs a native runner.
  # ---------------------------------------------------------------------------
  # build-macos:
  #   runs-on: macos-latest       # or your self-hosted macOS runner label
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: "lts/*"
  #         cache: npm
  #     - uses: dtolnay/rust-toolchain@stable
  #     - run: npm ci
  #     - run: npx tauri build
  #     - uses: actions/upload-artifact@v3
  #       with:
  #         name: meadow-macos-dmg
  #         path: src-tauri/target/release/bundle/dmg/*.dmg
  #     - uses: actions/upload-artifact@v3
  #       with:
  #         name: meadow-macos-app
  #         path: src-tauri/target/release/bundle/macos/*.app

  # ---------------------------------------------------------------------------
  # Windows build (requires a self-hosted Windows runner)
  # Uncomment and configure when a Windows runner is available.
  # Prerequisites on the runner: Visual Studio Build Tools, WebView2 runtime.
  # ---------------------------------------------------------------------------
  # build-windows:
  #   runs-on: windows-latest     # or your self-hosted Windows runner label
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: "lts/*"
  #         cache: npm
  #     - uses: dtolnay/rust-toolchain@stable
  #     - run: npm ci
  #     - run: npx tauri build
  #     - uses: actions/upload-artifact@v3
  #       with:
  #         name: meadow-windows-msi
  #         path: src-tauri/target/release/bundle/msi/*.msi
  #     - uses: actions/upload-artifact@v3
  #       with:
  #         name: meadow-windows-nsis
  #         path: src-tauri/target/release/bundle/nsis/*.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux]
    # When macOS/Windows builds are enabled, add them to needs:
    # needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
          files: |
            meadow-linux-deb/*.deb
            meadow-linux-appimage/*.AppImage
            # meadow-macos-dmg/*.dmg
            # meadow-windows-msi/*.msi
            # meadow-windows-nsis/*.exe
