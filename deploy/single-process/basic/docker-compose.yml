# Single-process backend deployment for mooR.
#
x-moor-image: &moor-image
  image: ghcr.io/timbran-project/moor:latest

services:
  moor:
    <<: *moor-image
    container_name: "moor"
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    environment:
      - RUST_BACKTRACE=1
      - HOME=/moor
      - XDG_CONFIG_HOME=/moor/.config
      - XDG_DATA_HOME=/moor/.local/share
    working_dir: /moor
    volumes:
      - ./moor-data:/moor/moor-data
      - ../../../cores:/moor/cores:ro
      - ./moor-config:/moor/.config
      - ./moor-local-share:/moor/.local/share
      - ./export:/moor/export
    command: >
      ./moor
        /moor/moor-data
        --db=production.db
        --generate-keypair
        --import=/moor/cores/lambda-moor/src
        --import-format=objdef
        --export=/moor/export
        --enable-curl-worker
    ports:
      - "8888:8888"
      - "8080:8080"
    restart: unless-stopped
