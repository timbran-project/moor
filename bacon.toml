# This is a "bacon" setup for the project which is used for development.
# Bacon is a tool for cargo which watches for local file changes and runs commands when they occur.
# See: https://dystroy.org/bacon/
# To install bacon, run `cargo install bacon`
# To run:
# `bacon moor`, `bacon daemon`, `bacon telnet`, and `bacon web` respectively.

default_job = "moor"

[jobs.moor]
command = [
    "cargo",
    "run",
    "-p",
    "moor-daemon",
    "--bin",
    "moor",
    "--",
    "./moor-data",
    "--db",
    "development.db",
    "--config-file",
    "moor-dev.yaml",
    "--import",
    "cores/cowbell/src",
    "--import-format",
    "objdef",
    "--export",
    "development-export",
    "--generate-keypair",
    "--enable-curl-worker",
]
allow_warnings = true
need_stdout = true

[jobs.daemon]
command = [
    "cargo",
    "run",
    "--release",
    "-p",
    "moor-daemon",
    "--",
    "./moor-data",
    "--db",
    "development.db",
    "--import",
    "cores/lambda-moor/src",
    "--import-format",
    "objdef",
    "--export",
    "development-export",
    "--export-format",
    "objdef",
    "--checkpoint-interval-seconds",
    "3600",
    "--generate-keypair",
]
allow_warnings = true
need_stdout = true

[jobs.daemon-debug]
command = [
    "cargo",
    "run",
    "-p",
    "moor-daemon",
    "--",
    "./moor-data",
    "--db",
    "development.db",
    "--import",
    "cores/lambda-moor/src",
    "--import-format",
    "objdef",
    "--export",
    "development-export",
    "--export-format",
    "objdef",
    "--checkpoint-interval-seconds",
    "3600",
    "--generate-keypair",
]
allow_warnings = true
need_stdout = true

[jobs.daemon-debug-traced]
command = [
    "cargo",
    "run",
    "--features",
    "trace_events",
    "-p",
    "moor-daemon",
    "--",
    "./moor-data",
    "--db",
    "development.db",
    "--import",
    "cores/lambda-moor/src",
    "--import-format",
    "objdef",
    "--export",
    "development-export",
    "--export-format",
    "objdef",
    "--checkpoint-interval-seconds",
    "3600",
    "--generate-keypair",
    "--trace-output",
    "moor-trace.json",
]
allow_warnings = true
need_stdout = true

[jobs.telnet]
command = [
    "cargo",
    "run",
    "-p",
    "moor-telnet-host",
    "--",
]
allow_warnings = true
need_stdout = true

[jobs.telnet-tls]
command = [
    "cargo",
    "run",
    "-p",
    "moor-telnet-host",
    "--",
    "--tls-port",
    "8889",
    "--tls-cert",
    "certs/test-cert.pem",
    "--tls-key",
    "certs/test-key.pem",
]
allow_warnings = true
need_stdout = true

[jobs.web]
command = [
    "cargo",
    "run",
    "-p",
    "moor-web-host",
    "--",
    "--listen-address",
    "0.0.0.0:8080",
]
allow_warnings = true

[jobs.test]
command = [
    "cargo",
    "test",
    "--color",
    "always",
    "--",
    "--color",
    "always", # see https://github.com/Canop/bacon/issues/124
]
need_stdout = true

[jobs.curl-worker]
command = [
    "cargo",
    "run",
    "-p",
    "moor-curl-worker",
    "--",
]
allow_warnings = true
need_stdout = true
