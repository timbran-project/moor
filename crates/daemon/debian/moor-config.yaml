# Moor single-process deployment configuration for Debian package
# This file configures the single-process `moor` binary.
features:
  persistent_tasks: true
  rich_notify: true
  type_dispatch: true
  flyweight_type: true
  bool_type: true
  use_boolean_returns: false
  custom_errors: true
  symbol_type: true
  use_symbols_in_builtins: false

import_export:
  input_path: "/usr/share/moor/cores/lambda-moor/src"
  import_format: "Objdef"
  output_path: "/var/spool/moor/core.export"
  checkpoint_interval: "600s"

database: { }

services:
  telnet:
    enabled: true
    address: "0.0.0.0"
    port: 8888
    health_check_port: 9888

  web:
    enabled: true
    listen_address: "0.0.0.0:8080"
    enable_webhooks: true

  curl_worker:
    enabled: false
