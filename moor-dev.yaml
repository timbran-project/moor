# Development config for the single-process `moor` binary.
features:
  persistent_tasks: true
  rich_notify: true
  type_dispatch: true
  flyweight_type: true
  bool_type: true
  use_boolean_returns: true
  custom_errors: true
  use_uuobjids: true
  anonymous_objects: true
  enable_eventlog: true
  symbol_type: true
  use_symbols_in_builtins: true

import_export:
  input_path: "cores/cowbell/src"
  import_format: "Objdef"
  output_path: "development-export"

database: { }

services:
  telnet:
    enabled: true
    address: "0.0.0.0"
    port: 8888
    health_check_port: 9888

  web:
    enabled: true
    listen_address: "0.0.0.0:8080"
    enable_webhooks: true

  curl_worker:
    enabled: false
